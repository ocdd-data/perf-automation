# NY weekly report — runs the prior complete Mon–Sun week and posts to Slack.
name: NY Weekly Run

on:
  schedule:
    # Monday 13:00 UTC = 09:00 EDT (NY). NY's Mon–Sun week closes Mon ~04:00 UTC,
    # so this runs ~9h after close. Note: fixed UTC — in EST (winter) 13:00 UTC is 08:00 NY.
    - cron: '0 13 * * 1'
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env file
        run: |
          echo "REDASH_BASE_URL=${{ secrets.REDASH_BASE_URL }}" >> .env
          echo "REDASH_API_KEY=${{ secrets.REDASH_API_KEY }}" >> .env
          echo "SLACK_TOKEN=${{ secrets.SLACK_TOKEN }}" >> .env
          echo "SLACK_CHANNEL=${{ secrets.SLACK_CHANNEL }}" >> .env

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: execute py script
        run: python -m weekly.ny
