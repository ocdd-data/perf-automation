name: NY Monthly Run

on:
  schedule:
    # 1st of each month 13:00 UTC = 09:00 EDT (NY). NY month closes 1st ~04:00–05:00 UTC,
    # so this runs ~8h after close. Note: fixed UTC — in EST (winter) 13:00 UTC is 08:00 NY.
    - cron: '0 13 1 * *'
  workflow_dispatch:        # allows manual triggering from the Actions tab

jobs:
  run-ny-perf-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment variables
        run: |
          echo "REDASH_API_KEY=${{ secrets.REDASH_API_KEY }}" >> .env
          echo "REDASH_BASE_URL=${{ secrets.REDASH_BASE_URL }}" >> .env
          echo "SLACK_TOKEN=${{ secrets.SLACK_TOKEN }}" >> .env
          echo "SLACK_CHANNEL=${{ secrets.SLACK_CHANNEL }}" >> .env

      - name: Run NY Perf Report Script
        run: python -m monthly.ny
